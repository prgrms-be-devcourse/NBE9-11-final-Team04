spring:
  application:
    name: backend-test

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

  datasource:
    url: jdbc:h2:mem:funding-test;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  mail:
    host: localhost
    port: 25
    username: test@test.com
    password: test

  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: test-secret-key-minimum-256-bits-long-for-hs256-algorithm
  access-expiry: 30m
  refresh-expiry: 14d

payment:
  webhook:
    secret: dev-webhook-secret

verification:
  forbidden-keywords:
    - 100% 보장

openai:
  verification:
    base-url: https://api.openai.com
    api-key: test-api-key
    model: gpt-4o-mini
    timeout-seconds: 300

nts:
  api:
    service-key: test-service-key
