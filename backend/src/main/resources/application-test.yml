spring:
  datasource:
    url: jdbc:mysql://localhost:3306/seedlink_test?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: test
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379

  mail:
    host: localhost
    port: 25
    username: test@test.com
    password: test
