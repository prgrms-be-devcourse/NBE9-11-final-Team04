admin:
  init:
    email: ${ADMIN_INIT_EMAIL}
    password: ${ADMIN_INIT_PASSWORD}
    name: ${ADMIN_INIT_NAME:관리자}
    nickname: ${ADMIN_INIT_NICKNAME:admin}
    age: ${ADMIN_INIT_AGE:30}
  internal:
    base-url: ${ADMIN_INTERNAL_BASE_URL}

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
    show-sql: false
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

app:
  base-url: https://seedlink.site/api

jwt:
  secret: ${JWT_SECRET}
  access-expiry: ${JWT_ACCESS_EXPIRY}
  refresh-expiry: ${JWT_REFRESH_EXPIRY}

nts:
  api:
    service-key: ${NTS_API_SERVICE_KEY}

openai:
  verification:
    api-key: ${OPENAI_API_KEY}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

expert:
  scheduler:
    reverify-cron: "0 0 0 * * MON"
    national-cron: "0 0 0 1 1,7 *"
    demote-cron: "0 0 0 * * *"

cloud:
  aws:
    s3:
      bucket: ${AWS_S3_BUCKET}
      region: ${AWS_S3_REGION:ap-northeast-2}
    credentials:
      access-key: ${AWS_ACCESS_KEY_ID}
      secret-key: ${AWS_SECRET_ACCESS_KEY}

server:
  servlet:
    context-path: /api

payment:
  gateway:
    type: ${PAYMENT_GATEWAY_TYPE:mock}
  toss:
    secret-key: ${TOSS_SECRET_KEY:}
    client-key: ${TOSS_CLIENT_KEY:}
  webhook:
    secret: ${PAYMENT_WEBHOOK_SECRET:dev-webhook-secret}

oauth:
  google:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
  kakao:
    client-id: ${KAKAO_CLIENT_ID}
