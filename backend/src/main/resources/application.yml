spring:
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 25MB
  application:
    name: backend
  profiles:
    active: local

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

app:
  base-url: http://localhost:8080

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true

  task:
    scheduling:
      pool:
        size: 2

server:
  port: 8080

payment:
  payout:
    auto-complete: true
    bank-code: "088"
    account-number: "000000000000"
    destination-seller-id: ""
    retry:
      max-attempts: 3
      delay-ms: 1000
      scheduler-delay-ms: 60000

verification:
  forbidden-keywords:
    - 100% 보장
    - 수익 확정
    - 무조건 성공
    - 절대 실패 없음
    - 원금 보장
    - 확실한 수익
    - 대박 보장
    - 즉시 수익
    - 리스크 없음
    - 위험 없는 투자
    - 무위험
    - 수익률 보장
    - 손실 없음
    - 반드시 성공
    - 무조건 수익

openai:
  verification:
    base-url: https://api.openai.com
    model: gpt-4o-mini
    timeout-seconds: 300

resilience4j:
  retry:
    instances:
      openAiVerification:
        max-attempts: 3
        wait-duration: 2s
  circuitbreaker:
    instances:
      openAiVerification:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
    timeout-seconds: 300
