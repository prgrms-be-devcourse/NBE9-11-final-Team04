name: CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 25 설치
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Gradle 캐시 설정
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: jar 빌드
        working-directory: backend
        run: ./gradlew build -x test

      - name: Docker 이미지 빌드
        run: |
          cp backend/build/libs/*.jar infra/app.jar
          docker build -t seedlink-app:latest infra/

      - name: Docker 이미지 저장
        run: docker save seedlink-app:latest | gzip > seedlink-app.tar.gz

      - name: EC2로 이미지 전송
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "seedlink-app.tar.gz,infra/docker-compose.yml"
          target: "/home/${{ secrets.EC2_USER }}/seedlink"

      - name: EC2 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/${{ secrets.EC2_USER }}/seedlink
            docker load < seedlink-app.tar.gz
            
            cat > .env << EOF
            DB_HOST=mysql
            DB_PORT=3306
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_ROOT_PASSWORD=${{ secrets.DB_ROOT_PASSWORD }}
            REDIS_HOST=redis
            REDIS_PORT=6379
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_ACCESS_EXPIRY=${{ secrets.JWT_ACCESS_EXPIRY }}
            JWT_REFRESH_EXPIRY=${{ secrets.JWT_REFRESH_EXPIRY }}
            NTS_API_SERVICE_KEY=${{ secrets.NTS_API_SERVICE_KEY }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            EOF
            
            docker compose down
            docker compose up -d