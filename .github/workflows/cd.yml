name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 25 설치
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Gradle 캐시 설정
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: jar 빌드
        working-directory: backend
        run: ./gradlew build -x test

      - name: 백엔드 Docker 이미지 빌드
        run: |
          mkdir -p infra
          ls -al backend/build/libs
          JAR_FILE=$(find backend/build/libs -maxdepth 1 -name "*.jar" ! -name "*-plain.jar" | head -n 1)

          if [ -z "$JAR_FILE" ]; then
            echo "실행 가능한 JAR 파일을 찾지 못했습니다."
            exit 1
          fi

          cp "$JAR_FILE" infra/app.jar
          docker build -t seedlink-app:latest infra/

      - name: 백엔드 Docker 이미지 저장
        run: docker save seedlink-app:latest | gzip > seedlink-app.tar.gz

      - name: 프론트엔드 Docker 이미지 빌드
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }} \
            --build-arg NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }} \
            --build-arg NEXT_PUBLIC_KAKAO_CLIENT_ID=${{ secrets.NEXT_PUBLIC_KAKAO_CLIENT_ID }} \
            -t seedlink-frontend:latest \
            ./frontend

      - name: 프론트엔드 Docker 이미지 저장
        run: docker save seedlink-frontend:latest | gzip > seedlink-frontend.tar.gz

      - name: EC2로 파일 전송
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "seedlink-app.tar.gz,seedlink-frontend.tar.gz,infra/docker-compose.yml,infra/nginx.conf.template,infra/payment.env"
          target: "/home/${{ secrets.EC2_USER }}/seedlink"

      - name: EC2 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/${{ secrets.EC2_USER }}/seedlink
            docker load < seedlink-app.tar.gz
            docker load < seedlink-frontend.tar.gz
            cp infra/docker-compose.yml docker-compose.yml
            cp infra/payment.env payment.env

            cat > .env << EOF
            DB_HOST=mysql
            DB_PORT=3306
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_ROOT_PASSWORD=${{ secrets.DB_ROOT_PASSWORD }}
            REDIS_HOST=redis
            REDIS_PORT=6379
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_ACCESS_EXPIRY=${{ secrets.JWT_ACCESS_EXPIRY }}
            JWT_REFRESH_EXPIRY=${{ secrets.JWT_REFRESH_EXPIRY }}
            NTS_API_SERVICE_KEY=${{ secrets.NTS_API_SERVICE_KEY }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }}
            AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}
            AWS_S3_REGION=${{ secrets.AWS_S3_REGION }}
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
            ADMIN_INIT_EMAIL=${{ secrets.ADMIN_INIT_EMAIL }}
            ADMIN_INIT_PASSWORD=${{ secrets.ADMIN_INIT_PASSWORD }}
            EOF
            cat infra/payment.env >> .env

            # nginx 설치 및 설정 적용
            if ! command -v nginx &> /dev/null; then
              sudo apt-get update && sudo apt-get install -y nginx
            fi
            set -a
            source infra/payment.env
            set +a
            envsubst '${PAYMENT_WEBHOOK_SECRET}' < infra/nginx.conf.template | sudo tee /etc/nginx/sites-available/seedlink > /dev/null
            sudo ln -sf /etc/nginx/sites-available/seedlink /etc/nginx/sites-enabled/seedlink
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo nginx -t && sudo systemctl reload nginx

            docker compose down
            docker compose up -d