server {
    listen 80;
    server_name _;

    root /home/ubuntu/seedlink/frontend/dist;
    index index.html;

    # React Router 지원
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 토스 웹훅 — 로컬/수동 배포용 (운영은 nginx.conf.template + envsubst)
    location /api/payments/webhooks/ {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Webhook-Secret "ecaf908f9dea08daa8583b869ab1de3529813a073bc3e37849785d34ec1de63d";
    }

    # 백엔드 API 프록시
    location /api/ {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}